plugins {
    id 'java-library'
    // buildSrc 里定义的资源 JSON 读取/打印插件。当前只读取并打印，不生成文件。
    id 'com.zootdungeon.atlas-codegen'
}

// [compileJava, compileTestJava]*.options*.encoding = 'GBK'
java{
    sourceCompatibility = appJavaCompatibility
    targetCompatibility = appJavaCompatibility
}

atlasCodegen {
    // 只扫描 mob_sprites 子目录下的 *.json，每个 JSON 对应一个要生成的 MobSprite 子类。
    // 其它位置（比如 cola/tiles_chel.json、gdx/textfield.json）不会被触碰。
    assetsRoot = file("$projectDir/src/main/assets/cola/mob_sprites")
    // 生成目录；插件会把它挂到 sourceSets.main.java.srcDirs 上。
    outputDirectory = file("$projectDir/src/autoGenerated/java")
    // 生成类的目标包。
    generatedPackage = 'com.zootdungeon.generated.sprites'
}


dependencies {
    api project(':SPD-classes')
    implementation project(':services')
    
    // Lua scripting support
    implementation 'org.luaj:luaj-jse:3.0.1'
}
